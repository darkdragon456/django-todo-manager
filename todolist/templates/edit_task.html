{% extends 'base.html' %}

{% block title %}
    Edit Task
{% endblock %}

{% block content %}
<div class="container py-4 py-md-5 d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
            {% if task_obj.owner == user %}
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="background-color: #1f1f1f; color: #f8f9fa;">
                <div class="card-body p-4 p-sm-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2">
                            <span class="me-2">✏️</span>Edit Task
                        </h2>
                        <p class="text-muted mb-0">Update your task details below.</p>
                    </div>

                    <form method="POST" class="w-100">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-light">Task</label>
                            <input type="Text" class="form-control form-control-lg rounded-3 border-0" style="background-color: #2b2b2b; color: #fff;" name="task" placeholder="{{ task_obj.task }}" value="{{ task_obj.task }}">
                            <input type="hidden" class="form-control" name="is_completed" value="{{ task_obj.is_completed }}">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 py-2">Update Task</button>
                        <a href="{% url 'todolist' %}" class="btn btn-outline-light btn-lg w-100 rounded-3 py-2 mt-3">Back to Tasks</a>
                    </form>
                </div>
            </div>
            {% else %}
            <div class="card border-0 shadow-lg rounded-4 p-4 text-center" style="background-color: #1f1f1f; color: #f8f9fa;">
                <p class="mb-0">Access Restricted !</p>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock content %}
